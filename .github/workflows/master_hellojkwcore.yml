# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - hellojkwcore

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  SOLUTION_PATH: ./HelloJkwCore/HelloJkwCore.slnx
  APP_PROJECT_PATH: ./HelloJkwCore/HelloJkwCore/HelloJkwCore.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish
  ARTIFACT_NAME: dotnet-app
  AZURE_WEBAPP_NAME: hellojkwcore
  AZURE_WEBAPP_SLOT: Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ga

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.APP_PROJECT_PATH }} --configuration Release --no-build --no-restore --output ${{ env.PUBLISH_DIR }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    concurrency:
      group: hellojkwcore-production
      cancel-in-progress: false
    environment:
      name: ${{ env.AZURE_WEBAPP_SLOT }}
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D10050596FC34F7FB5D6463DD2675EE4 }}
          package: ${{ env.PUBLISH_DIR }}
